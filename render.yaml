services:
  - type: web
    name: meu-atendimento-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: BOT_API_PORT
        value: 3001
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: true
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium
    disk:
      name: whatsapp-auth
      mountPath: /app/.wwebjs_auth
      sizeGB: 1
